<template>
    <lightning-card title="Accounts">

        <lightning-input label="Search Account" onchange={handleSearch}>
        </lightning-input>

        <lightning-datatable key-field="Id" data={accounts} columns={columns} onrowaction={handleRowAction}>
        </lightning-datatable>

        <lightning-button label="Previous" onclick={handlePrevious}>
        </lightning-button>

        <lightning-button label="Next" onclick={handleNext}>
        </lightning-button>

    </lightning-card>
</template>
